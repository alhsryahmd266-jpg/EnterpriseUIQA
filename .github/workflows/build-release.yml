name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.1)'
        required: false
        default: '1.0.0'

jobs:
  build:
    name: Build, Sign & Release APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. JDK 17 ────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle permissions ────────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ── 4. Decode keystore from GitHub Secret ────────────────────────────
      - name: Decode release keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.jks
          echo "Keystore decoded ✓"

      # ── 5. Build Release APK ─────────────────────────────────────────────
      - name: Build Release APK
        env:
          KEYSTORE_PATH: keystore/release.jks
          KEY_ALIAS:     ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:  ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # ── 6. Rename APK ────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          mv app/build/outputs/apk/release/app-release.apk \
             EnterpriseUIQA-v${VERSION}-release.apk
          echo "APK_PATH=EnterpriseUIQA-v${VERSION}-release.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV

      # ── 7. Upload APK artifact ───────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnterpriseUIQA-release-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # ── 8. Create GitHub Release (only on tag push) ──────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          name: "Enterprise UI QA v${{ env.VERSION }}"
          body: |
            ## Enterprise UI QA Automation Framework
            ### Release v${{ env.VERSION }}

            #### المحتويات:
            - ✅ `UiAutomationService` — خدمة وصول مخصصة
            - ✅ `BezierTouchEngine` — محرك محاكاة لمس بمنحنيات بيزيه
            - ✅ دعم السحب، النقر، والضغط المطوّل
            - ✅ فحص شجرة العناصر الكاملة

            #### التثبيت:
            1. حمّل الـ APK
            2. فعّل "مصادر غير معروفة" في الإعدادات
            3. ثبّت وافتح التطبيق
            4. فعّل خدمة إمكانية الوصول من الإعدادات
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
