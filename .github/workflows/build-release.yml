name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name'
        required: false
        default: '1.0.0'

jobs:
  build:
    name: Build, Sign & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Setup keystore
        run: |
          mkdir -p keystore
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore/release.jks
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> $GITHUB_ENV
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}" >> $GITHUB_ENV
          else
            keytool -genkeypair \
              -alias uiqa -keyalg RSA -keysize 4096 -validity 10000 \
              -keystore keystore/release.jks \
              -storepass UIQAStore2025 -keypass UIQAKey2025 \
              -dname "CN=EnterpriseUIQA,OU=QA,O=Enterprise,L=Cairo,ST=Cairo,C=EG" \
              -noprompt
            echo "KEY_ALIAS=uiqa"            >> $GITHUB_ENV
            echo "KEY_PASSWORD=UIQAKey2025"  >> $GITHUB_ENV
            echo "STORE_PASSWORD=UIQAStore2025" >> $GITHUB_ENV
          fi

      - name: Build Release APK
        env:
          KEYSTORE_PATH: keystore/release.jks
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Verify APK signature
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          echo "APK found: $APK"
          jarsigner -verify -verbose -certs "$APK" | grep -E "verified|signer|CN=" | head -10

      - name: Rename & stage APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          mv "$APK" "EnterpriseUIQA-v${VERSION}-release.apk"
          echo "APK_PATH=EnterpriseUIQA-v${VERSION}-release.apk" >> $GITHUB_ENV
          echo "VERSION=${VERSION}" >> $GITHUB_ENV
          ls -lh "EnterpriseUIQA-v${VERSION}-release.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnterpriseUIQA-release-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          name: "Enterprise UI QA v${{ env.VERSION }}"
          body: |
            ## Enterprise UI QA Automation Framework v${{ env.VERSION }}
            - ✅ `UiAutomationService` — Custom AccessibilityService
            - ✅ `BezierTouchEngine` — Cubic Bezier touch simulation (4 control points)
            - ✅ Swipe, Tap, LongPress gestures
            - ✅ Window tree inspector
            - ✅ Signed with RSA-4096 digital signature

            **Install:** Enable "Unknown sources" → install APK → enable Accessibility Service
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
