name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name'
        required: false
        default: '1.0.0'

jobs:
  build:
    name: Build, Sign & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Setup keystore (JKS format)
        run: |
          mkdir -p "$GITHUB_WORKSPACE/keystore"
          KS_ABS="$GITHUB_WORKSPACE/keystore/release.jks"
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > "$KS_ABS"
            echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}"            >> $GITHUB_ENV
            echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}"       >> $GITHUB_ENV
            echo "STORE_PASSWORD=${{ secrets.STORE_PASSWORD }}"   >> $GITHUB_ENV
          else
            # Force JKS format; use identical store+key password to avoid PKCS12 padding issues
            keytool -genkeypair \
              -alias uiqa \
              -keyalg RSA \
              -keysize 4096 \
              -validity 10000 \
              -storetype JKS \
              -keystore "$KS_ABS" \
              -storepass EnterpriseUIQA2025 \
              -keypass  EnterpriseUIQA2025 \
              -dname "CN=EnterpriseUIQA,OU=QA,O=Enterprise,L=Cairo,ST=Cairo,C=EG" \
              -noprompt
            echo "KEY_ALIAS=uiqa"                    >> $GITHUB_ENV
            echo "KEY_PASSWORD=EnterpriseUIQA2025"   >> $GITHUB_ENV
            echo "STORE_PASSWORD=EnterpriseUIQA2025" >> $GITHUB_ENV
          fi
          echo "KEYSTORE_PATH=$KS_ABS"               >> $GITHUB_ENV
          echo "Keystore OK → $KS_ABS"
          keytool -list -keystore "$KS_ABS" -storepass EnterpriseUIQA2025 2>&1 | grep -E "Alias|Entry type|valid" || true

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - name: Verify APK signature
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          SIZE=$(du -sh "$APK" | cut -f1)
          echo "APK: $APK  ($SIZE)"
          jarsigner -verify -verbose -certs "$APK" 2>&1 | grep -E "jar verified|CN=|signer" | head -5

      - name: Rename APK
        run: |
          VERSION="${{ github.event.inputs.version_name || '1.0.0' }}"
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          DEST="EnterpriseUIQA-v${VERSION}-release-signed.apk"
          mv "$APK" "$DEST"
          echo "APK_PATH=$DEST"   >> $GITHUB_ENV
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          ls -lh "$DEST"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: EnterpriseUIQA-release-apk
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
          name: "Enterprise UI QA v${{ env.VERSION }}"
          body: |
            ## Enterprise UI QA Automation Framework v${{ env.VERSION }}
            - ✅ `UiAutomationService` — Custom AccessibilityService
            - ✅ `BezierTouchEngine` — Cubic Bezier touch simulation
            - ✅ Swipe / Tap / LongPress gestures
            - ✅ Window tree inspector
            - ✅ Signed RSA-4096 (JKS)
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
